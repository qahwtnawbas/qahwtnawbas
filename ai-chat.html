<script>
/**
 * ==============================================================================
 * 🚀 الألعاب المدمجة
 * ==============================================================================
 */

// --- 1. لعبة اكس اوه (خوارزمية Minimax - مستحيل الهزيمة) ---
let board = ['', '', '', '', '', '', '', '', ''];
let currentPlayer = 'X';
let gameActive = true;
const winConditions = [ [0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6] ];

function initXO() {
    board = ['', '', '', '', '', '', '', '', ''];
    currentPlayer = 'X'; gameActive = true;
    document.getElementById('xo-status').innerText = "دورك يا نشمي (X)";
    const container = document.getElementById('xo-board');
    container.innerHTML = '';
    for(let i=0; i<9; i++) {
        let cell = document.createElement('div');
        cell.className = 'xo-cell';
        cell.onclick = () => handleCellClick(cell, i);
        container.appendChild(cell);
    }
}

function checkWinnerForMinimax(b) {
    for(let i=0; i<winConditions.length; i++) {
        const [x, y, z] = winConditions[i];
        if(b[x] && b[x] === b[y] && b[x] === b[z]) return b[x];
    }
    if(!b.includes('')) return 'tie';
    return null;
}

function minimax(newBoard, depth, isMaximizing) {
    let result = checkWinnerForMinimax(newBoard);
    if (result === 'O') return 10 - depth;
    if (result === 'X') return depth - 10;
    if (result === 'tie') return 0;

    if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (newBoard[i] === '') {
                newBoard[i] = 'O';
                let score = minimax(newBoard, depth + 1, false);
                newBoard[i] = '';
                bestScore = Math.max(score, bestScore);
            }
        }
        return bestScore;
    } else {
        let bestScore = Infinity;
        for (let i = 0; i < 9; i++) {
            if (newBoard[i] === '') {
                newBoard[i] = 'X';
                let score = minimax(newBoard, depth + 1, true);
                newBoard[i] = '';
                bestScore = Math.min(score, bestScore);
            }
        }
        return bestScore;
    }
}

function handleCellClick(cell, index) {
    if(board[index] !== '' || !gameActive) return;
    board[index] = currentPlayer;
    cell.innerText = currentPlayer;
    cell.style.color = currentPlayer === 'X' ? 'var(--danger)' : 'var(--primary)';
    
    let winner = checkWinnerForMinimax(board);
    if(winner) {
        if(winner === 'tie') document.getElementById('xo-status').innerText = "تعادل يا نشامى! مستحيل تفوز علي 😉";
        else document.getElementById('xo-status').innerText = `الفائز هو (${winner})! 🎉`;
        gameActive = false; setTimeout(initXO, 3000); return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    document.getElementById('xo-status').innerText = currentPlayer === 'X' ? "دورك يا نشمي (X)" : "دور فستق (O) بفكر...";
    
    if(currentPlayer === 'O') setTimeout(aiMoveXO, 400);
}

function aiMoveXO() {
    if (!gameActive) return;
    let bestScore = -Infinity;
    let move;
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'O';
            let score = minimax(board, 0, false);
            board[i] = '';
            if (score > bestScore) { bestScore = score; move = i; }
        }
    }
    let cells = document.getElementsByClassName('xo-cell');
    handleCellClick(cells[move], move);
}

// --- 2. لعبة الماوس المستحيلة ---
let mLevel = 1; let mBoxSize = 100; let mEscapeDist = 90;

function initMouseGame() {
    mLevel = 1; mBoxSize = 100; mEscapeDist = 90;
    document.getElementById('m-level').innerText = mLevel;
    updateMouseTarget();
}

function updateMouseTarget() {
    const target = document.getElementById('mouse-target');
    target.style.width = mBoxSize + 'px'; target.style.height = mBoxSize + 'px';
    const area = document.getElementById('mouse-game-area');
    const maxX = area.clientWidth - mBoxSize;
    const maxY = area.clientHeight - mBoxSize - 100; 
    
    let randomX = Math.max(0, Math.random() * maxX);
    let randomY = Math.max(0, Math.random() * maxY);
    
    target.style.left = randomX + 'px';
    target.style.top = randomY + 'px';
}

function checkDistanceAndEscape(clientX, clientY) {
    const target = document.getElementById('mouse-target');
    const rect = target.getBoundingClientRect();
    const centerX = rect.left + (rect.width / 2); 
    const centerY = rect.top + (rect.height / 2);
    const dist = Math.sqrt(Math.pow(clientX - centerX, 2) + Math.pow(clientY - centerY, 2));
    
    if (dist < mEscapeDist) updateMouseTarget(); 
}

document.getElementById('mouse-game-area').addEventListener('mousemove', (e) => {
    checkDistanceAndEscape(e.clientX, e.clientY);
});

document.getElementById('mouse-game-area').addEventListener('touchmove', (e) => {
    checkDistanceAndEscape(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

function handleTargetHit(e) {
    e.stopPropagation(); e.preventDefault();
    if (mLevel < 15) {
        mLevel++; 
        mBoxSize = Math.max(25, mBoxSize - 5); 
        mEscapeDist += 15; 
        document.getElementById('m-level').innerText = mLevel;
        
        const target = document.getElementById('mouse-target');
        target.style.background = 'white';
        setTimeout(() => { target.style.background = 'var(--accent)'; }, 100);
        
        updateMouseTarget();
    } else {
        alert('كيف فزت ، مبروك فزت باللعبة كمل المحادثة مع فستق');
        initMouseGame();
    }
}

document.getElementById('mouse-target').addEventListener('mousedown', handleTargetHit);
document.getElementById('mouse-target').addEventListener('touchstart', handleTargetHit, {passive: false});


function openGame(id) {
    document.getElementById(id).style.display = 'flex';
    if(id === 'game-xo') initXO();
    if(id === 'game-mouse') initMouseGame();
}

function closeGame(id) { document.getElementById(id).style.display = 'none'; }

 */

    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.firestore();

    const State = { user: null, history: [], sid: '', needsHuman: false, inputLocked: false, unsub: null };

    const UI = {
        gate: document.getElementById('ui-gate'), shell: document.getElementById('shell'),
        box: document.getElementById('chatBox'), inp: document.getElementById('userInput'), 
        send: document.getElementById('sendBtn'), menu: document.getElementById('sideMenu'),

    window.SupremeEvents = {
        requestHuman: async () => {
            // 1. الرسالة اللي بتظهر للزبون
            const sysMsg = { role: 'system', content: '<i class="fa-solid fa-bell-concierge"></i> تم استدعاء الإدارة. ثواني وبكون معك موظفنا يا نشمي...', time: Date.now() };
            State.history.push(sysMsg);
            
            // 🔥 2. السر هون: الشفرة المخفية اللي البانيل بتدور عليها عشان تشغل الإنذار 🔥
            State.history.push({ role: 'system', content: 'TRANSFER_TO_HUMAN_SUPPORT', time: Date.now() });

            await db.collection('chats').doc(State.sid).set({ needsHuman: true, messages: State.history, timestamp: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        },
        cancelHuman: async () => {
            const aiMsg = { role: 'assistant', content: 'يا هلا فيك يا غالي، أنا فستق سداد ومكفي، كيف بقدر أخدمك اليوم؟ ☕', time: Date.now() };
            State.history.push(aiMsg);
            await db.collection('chats').doc(State.sid).set({ messages: State.history }, { merge: true });
            UI.box.scrollTop = UI.box.scrollHeight;
        },
        playChatGame: async () => { SupremeSystem.sendRawMessage("اعطيني لغز أو حزورة صعبة جدا عن القهوة"); },
        showGamesMenu: async () => {
            const btnHtml = `يا هلا باللعب والتحدي! اختار اللعبة اللي بتعجبك يا نشمي:<br>
            <div class="ai-action-grid">
                <button class="ai-btn-primary" style="background:var(--accent); color:var(--dark);" onclick="openGame('game-mouse')"><i class="fa-solid fa-computer-mouse"></i> لعبة الماوس</button>
                <button class="ai-btn-primary" style="background:var(--danger);" onclick="openGame('game-xo')"><i class="fa-solid fa-xmarks-lines"></i> اكس اوه الخارق</button>
                <button class="ai-btn-primary" onclick="window.SupremeEvents.playChatGame()"><i class="fa-solid fa-comment-dots"></i> ألغاز بالشات</button>
            </div>`;
            State.history.push({ role: 'assistant', content: btnHtml, time: Date.now() });
            await db.collection('chats').doc(State.sid).set({ messages: State.history }, { merge: true });
            UI.box.scrollTop = UI.box.scrollHeight;
        }
    };

    return {
        init() {
            auth.onAuthStateChanged(async u => {
                if (u) {
                    State.user = u;
                    const banned = await db.collection('banned_users').doc(u.email).get();
                    if(banned.exists) {
                        document.getElementById('ui-ban').classList.remove('hide');
                        UI.gate.classList.add('hide');
                        document.getElementById('bad-word').innerText = "مخالفة أمنية مسجلة مسبقاً";
                    } else { this.unlock(u); }
                } else { this.lock(); }
            });

            document.getElementById('btnLogin').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            document.getElementById('btnLogout').onclick = () => auth.signOut();
            UI.send.onclick = () => this.handle();
            UI.inp.onkeypress = e => { if(e.key === 'Enter') this.handle(); };
            
            UI.toggle.onclick = () => UI.menu.classList.toggle('open');
            document.getElementById('btn-new').onclick = () => { UI.menu.classList.remove('open'); localStorage.removeItem('qahwtna_session'); if(State.unsub) State.unsub(); this.start(); };
            document.getElementById('btn-history').onclick = () => { UI.menu.classList.remove('open'); this.showHistory(); };
        },

        unlock(u) {
            UI.gate.classList.add('hide'); UI.shell.classList.add('active');
            document.getElementById('uName').innerHTML = `${u.displayName.split(' ')[0]} 🇯🇴`;
            document.getElementById('uMail').innerText = u.email;
            document.getElementById('uImg').src = u.photoURL;
            let savedSid = localStorage.getItem('qahwtna_session');
            if(savedSid) { this.loadChat(savedSid); } else { this.start(); }
        },

        lock() { UI.shell.classList.remove('active'); UI.gate.classList.remove('hide'); },

        async start() {
            State.history = []; State.needsHuman = false; State.inputLocked = false;
            State.sid = "FSTQ-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('qahwtna_session', State.sid);
            await db.collection('chats').doc(State.sid).set({
                refId: State.sid, userEmail: State.user.email, userName: State.user.displayName, uid: State.user.uid, needsHuman: false, inputLocked: false,
                messages: [{ role: 'assistant', content: 'حياك الله يا نشمي! أنا فستق.. شو حابب نلعب اليوم؟ ولا اطلبلك من المنيو؟ ☕✨', time: Date.now() }], 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            this.listenToChat();
        },

        listenToChat() {
            if(State.unsub) State.unsub();
            State.unsub = db.collection('chats').doc(State.sid).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    State.history = data.messages || [];
                    State.needsHuman = data.needsHuman || false; State.inputLocked = data.inputLocked || false;
                    
                    document.getElementById('ai-status').innerHTML = State.needsHuman ? '<i class="fa-solid fa-headset"></i> الإدارة متصلة' : 'V25.0 ENTERPRISE';
                    document.getElementById('ai-status').style.color = State.needsHuman ? 'var(--danger)' : 'var(--accent)';
                    
                    UI.inp.disabled = State.inputLocked; UI.send.disabled = State.inputLocked;
                    UI.inp.placeholder = State.inputLocked ? "🔒 الإدارة أوقفت ميزة الكتابة مؤقتاً..." : "اسأل فستق...";
                    this.renderMessages();
                } else {
                    localStorage.removeItem('qahwtna_session'); if(State.unsub) State.unsub(); this.start();
                }
            });
        },

        renderMessages() {
            UI.box.innerHTML = '';
            State.history.forEach(m => {
                if(m.content === 'TRANSFER_TO_HUMAN_SUPPORT' || m.content.includes('thinking-dots')) return; 

                const row = document.createElement('div'); const bbl = document.createElement('div'); bbl.className = 'bubble';
                let txt = m.content;
                let timeStr = m.time ? new Date(m.time).toLocaleTimeString('ar-EG', {hour: '2-digit', minute: '2-digit'}) : '';
                let uName = State.user ? State.user.displayName : 'الزبون';

                if(m.role === 'user') { row.className = 'msg-row user'; txt = `<div class="sender-tag" style="color:rgba(255,255,255,0.8)"><i class="fa-solid fa-user"></i> ${uName} • ${timeStr}</div>${txt}`; } 
                else if(m.role === 'admin') { row.className = 'msg-row admin'; txt = `<div class="sender-tag" style="color:var(--danger)"><i class="fa-solid fa-headset"></i> موظف الإدارة • ${timeStr}</div>${txt}`; } 
                else if(m.role === 'system') { row.className = 'msg-row sys'; } 
                else { row.className = 'msg-row bot'; txt = `<div class="sender-tag" style="color:var(--primary)"><i class="fa-solid fa-robot"></i> فستق AI • ${timeStr}</div>${txt}`; }
                
                bbl.innerHTML = txt; row.appendChild(bbl); UI.box.appendChild(row);
            });
            UI.box.scrollTop = UI.box.scrollHeight;
        },

        async sendRawMessage(val) {
            State.history.push({ role: 'user', content: val, time: Date.now() });
            await db.collection('chats').doc(State.sid).set({ messages: State.history }, { merge: true });
            this.triggerAI(val);
        },

        async handle() {
            const val = UI.inp.value.trim();
            if(!val || State.inputLocked) return;
            UI.inp.disabled = true; UI.send.disabled = true; UI.inp.value = '';
            State.history.push({ role: 'user', content: val, time: Date.now() });
            await db.collection('chats').doc(State.sid).set({ refId: State.sid, userEmail: State.user.email, userName: State.user.displayName, uid: State.user.uid, messages: State.history, timestamp: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
            if(State.needsHuman) { UI.inp.disabled = false; UI.send.disabled = false; UI.inp.focus(); return; }
            this.triggerAI(val);
        },

        async triggerAI(val) {
            const thinkId = 'think-' + Date.now();
            const row = document.createElement('div'); row.className = 'msg-row bot'; row.id = thinkId;
            row.innerHTML = `<div class="bubble"><span class="thinking-dots">...</span></div>`;
            UI.box.appendChild(row); UI.box.scrollTop = UI.box.scrollHeight;

            try {
                const historyForAI = State.history.slice(-8);
                const reply = await window.getAIResponse(val, historyForAI);
                if(document.getElementById(thinkId)) document.getElementById(thinkId).remove();

                if(reply === '[INTENT:BAN]') {
                    await db.collection('banned_users').doc(State.user.email).set({ email: State.user.email, word_used: "مخالفة سياسات المقهى الذكية", timestamp: Date.now() });
                    document.getElementById('ui-ban').classList.remove('hide'); UI.shell.classList.remove('active'); return;
                } 
                else if (reply === '[INTENT:HUMAN_REQ]') {
                    const btnHtml = `عذراً على أي إزعاج يا نشمي، الإدارة جاهزة لخدمتك. هل تحتاج للتحدث مع موظف الآن؟<br>
                    <div class="ai-action-grid">
                        <button class="ai-btn-primary" onclick="window.SupremeEvents.requestHuman()"><i class="fa-solid fa-headset"></i> نعم،  اريد التحدث مع موظف</button>
                        <button class="ai-btn-secondary" onclick="window.SupremeEvents.cancelHuman()"><i class="fa-solid fa-xmark"></i> لا، شكراً</button>
                    </div>`;
                    State.history.push({ role: 'assistant', content: btnHtml, time: Date.now() });
                }
                else if (reply === '[INTENT:TRANSFER_NOW]') {
                    window.SupremeEvents.requestHuman();
                }
                else if (reply === '[INTENT:PLAY_REQ]') { 
                    window.SupremeEvents.showGamesMenu(); 
                }
                else { 
                    State.history.push({ role: 'assistant', content: reply, time: Date.now() }); 
                }

                await db.collection('chats').doc(State.sid).set({ messages: State.history, timestamp: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                if(State.history.length === 3) {
                    const newTitle = await window.getSmartTitle([{role: 'user', content: val}]);
                    await db.collection('chats').doc(State.sid).set({ userEmail: newTitle }, { merge: true });
                }
            } catch(e) { if(document.getElementById(thinkId)) document.getElementById(thinkId).remove(); }
            UI.inp.disabled = false; UI.send.disabled = false; UI.inp.focus();
        },

        async showHistory() {
            const list = document.getElementById('hList'); 
            list.innerHTML = '<div style="text-align:center; padding: 30px; font-weight: bold; color: var(--primary); font-size: 18px;"><i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px; display: block;"></i> جاري استدعاء الأرشيف...</div>';
            document.getElementById('historyBox').style.display = 'flex';
            
            try {
                const snap = await db.collection('chats').where('uid', '==', State.user.uid).get();
                list.innerHTML = '';
                if (snap.empty) { list.innerHTML = '<div style="text-align:center; padding: 30px; font-weight: bold; color: var(--text-muted); font-size: 18px;">لا يوجد سواليف سابقة بيننا!</div>'; return; }

                let docs = []; snap.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

                docs.forEach(d => {
                    const item = document.createElement('div'); item.className = 'h-item';
                    let statusIcon = d.needsHuman ? '<i class="fa-solid fa-headset" style="color:var(--danger)"></i>' : '<i class="fa-solid fa-robot" style="color:var(--accent)"></i>';
                    item.innerHTML = `
                        <div class="h-info" style="flex: 1;" onclick="SupremeSystem.loadChat('${d.id}')">
                            <b style="color: var(--primary); font-size: 16px; margin-bottom: 5px; display: block;">${statusIcon} ${d.userEmail || 'دردشة فستق'}</b>
                            <small style="color: var(--text-muted); font-family: 'Orbitron'; font-weight: 800;">${new Date(d.timestamp?.toMillis() || Date.now()).toLocaleDateString('ar-EG')} - ${d.refId}</small>
                        </div>
                        <i class="fa-solid fa-trash-can h-del" onclick="event.stopPropagation(); SupremeSystem.delChat('${d.id}')" title="حذف المحادثة"></i>
                    `;
                    list.appendChild(item);
                });
            } catch (error) { list.innerHTML = '<div style="text-align:center; color: var(--error); font-weight: bold;">تعذر جلب الأرشيف!</div>'; }
        },

        async loadChat(id) { localStorage.setItem('qahwtna_session', id); State.sid = id; document.getElementById('historyBox').style.display = 'none'; this.listenToChat(); },

        async delChat(id) {
            if(confirm("تنبيه: سيتم حذف هذه المحادثة بشكل نهائي من السيرفر. هل أنت متأكد يا غالي؟")) {
                await db.collection('chats').doc(id).delete();
                if(State.sid === id) { localStorage.removeItem('qahwtna_session'); if(State.unsub) State.unsub(); this.start(); }
                this.showHistory();
            }
        }
    };
})();
window.SupremeSystem = SupremeSystem;
window.addEventListener('DOMContentLoaded', () => SupremeSystem.init());
</script>
</body>
</html>
