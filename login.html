
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخولر| قهوتنا وبس</title>
    <link rel="icon" type="image/x-icon" href="https://www.appcreator24.com/srv/imgs/gen/3947485_ico.png?ts=1773849297">
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. متغيراتك الأصلية بالحرف الواحد */
        :root {
            --q-primary: #1B4332; --q-primary-light: #2D6A4F; --q-primary-dark: #081C15;
            --q-accent: #40916C; --q-gold: hwb(120 66% 8%); --q-white: #ffffff;
            --q-off-white: #f8fbf9; --q-dark: #111827; --q-gray: #6b7280;
            --q-danger: #e63946; --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.2); --glass-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-main: 'IBM Plex Sans Arabic', sans-serif; --font-heading: 'Tajawal', sans-serif;
            --trans-fast: 0.3s ease; --trans-smooth: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            --z-nav: 1000; --z-dropdown: 1010; --z-toast: 9999;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: var(--font-main); background-color: var(--q-off-white); color: var(--q-dark); line-height: 1.8; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; transition: var(--trans-fast); }
        h1, h2, h3 { font-family: var(--font-heading); font-weight: 900; }
        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 5%; }

        /* 2. شاشة التحميل الخاصة بك (كوب القهوة والدخان) */
        #preloader { position: fixed; inset: 0; background: var(--q-primary-dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        .loader-cup { width: 80px; height: 80px; border: 4px solid var(--q-gold); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; position: relative; animation: floatCup 2s infinite ease-in-out; }
        .loader-cup::after { content: ''; position: absolute; top: 10px; right: -20px; width: 25px; height: 40px; border: 4px solid var(--q-gold); border-radius: 20px; }
        .loader-smoke { display: flex; gap: 10px; position: absolute; top: -40px; left: 15px; }
        .smoke-line { width: 4px; height: 30px; background: rgba(212,163,115,0.6); border-radius: 5px; animation: smokeRise 1.5s infinite ease-in; opacity: 0; }
        @keyframes floatCup { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes smokeRise { 0% { transform: translateY(0) scaleY(1); opacity: 0.8; } 100% { transform: translateY(-30px) scaleY(2); opacity: 0; } }
        .loader-text { margin-top: 30px; color: var(--q-gold); font-family: var(--font-heading); font-size: 20px; letter-spacing: 2px; }

        /* 3. الهيدر الأصلي */
        .main-header { position: fixed; top: 0; left: 0; width: 100%; z-index: var(--z-nav); background: transparent; padding: 25px 0; transition: var(--trans-smooth); }
        .main-header.scrolled { padding: 10px 0; background: var(--glass-bg); backdrop-filter: blur(25px); box-shadow: var(--glass-shadow); border-bottom: 1px solid var(--glass-border); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo-box { font-family: var(--font-heading); font-size: 28px; color: var(--q-white); border: 3px solid var(--q-white); padding: 5px 20px; }
        .main-header.scrolled .logo-box { color: var(--q-primary); border-color: var(--q-primary); }

        .nav-menu { display: flex; align-items: center; gap: 35px; list-style: none; }
        .nav-item { position: relative; font-weight: 700; color: var(--q-white); font-size: 16px; cursor: pointer; }
        .main-header.scrolled .nav-item { color: var(--q-dark); }
        .nav-item:hover, .nav-item.active { color: var(--q-gold); }

        /* 4. تصميم بطاقة الدخول (متوافقة مع ستايلك) */
        .login-hero { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: var(--q-primary-dark); padding: 150px 20px 100px; overflow: hidden; }
        .login-hero-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1442512595331-e89e73853f31?q=80&w=2000&auto=format&fit=crop') center/cover; opacity: 0.3; }
        
        .login-card { position: relative; z-index: 3; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px 40px; border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 420px; text-align: center; color: var(--q-white); }
        .login-card img { width: 85px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(212,163,115,0.4)); }
        .login-card h1 { font-size: 28px; margin-bottom: 10px; color: var(--q-gold); }
        .login-card p { font-size: 15px; margin-bottom: 35px; color: #b7e4c7; }

        .btn-google { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--q-white); color: var(--q-dark); font-weight: 800; font-size: 16px; cursor: pointer; transition: var(--trans-fast); display: flex; align-items: center; justify-content: center; gap: 15px; font-family: var(--font-main); }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* 5. الفوتر الأصلي الضخم */
        .mega-footer { background: #040d0a; color: #9ca3af; padding: 100px 0 30px; margin-top: auto; position: relative; z-index: 2; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; gap: 60px; }
        .f-brand h3 { font-size: 32px; color: var(--q-white); margin-bottom: 20px; }
        .f-brand h3 span { color: var(--q-gold); }
        .f-links h4 { color: var(--q-white); margin-bottom: 20px; font-size: 20px; }
        .f-links ul { list-style: none; padding: 0; }
        .f-links ul li { margin-bottom: 10px; }
        .f-links ul a:hover { color: var(--q-gold); }
        .dev-badge { background: rgba(255,255,255,0.03); padding: 8px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); }

        /* الإشعارات */
        #toast-box { position: fixed; bottom: 30px; left: 30px; z-index: var(--z-toast); display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .toast { background: var(--q-white); color: var(--q-dark); padding: 18px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 15px; font-weight: 700; font-size: 15px; border-right: 5px solid var(--q-primary); animation: slideIn 0.5s ease forwards; }
        .toast.error { border-right-color: var(--q-danger); }
        .toast.error i { color: var(--q-danger); font-size: 20px; }
        .toast.success { border-right-color: var(--q-gold); }
        .toast.success i { color: var(--q-gold); font-size: 20px; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }

        @media (max-width: 992px) { .nav-menu { display: none; } .footer-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-cup">
            <div class="loader-smoke">
                <span class="smoke-line"></span><span class="smoke-line"></span><span class="smoke-line"></span>
            </div>
        </div>
        
    </div>

    <header class="main-header" id="navbar">
        <div class="container nav-container">
            <a class='logo-box' href='/'>قهوتنا وبس</a>
            <nav>
                <ul class="nav-menu">
                    
                    <li><a class='nav-item active' href='/' style='color: var(--q-gold);'>الرئيسية</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="login-hero">
        <div class="login-hero-bg"></div>
        <div class="login-card" data-aos="zoom-in">
            <img src="logo1.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/924/924514.png'">
            <h1>بوابة الاكترونية</h1>
            <p>by : KARAM GHANDI </p>
            
            
            <button type="button" class="btn-google" id="secure-google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="24">
                تسجيل الدخول باستخدام Google
            </button>
        </div>
    </main>

    

    <div id="toast-box"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // إخفاء التحميل وتفعيل تأثير السكرول (نفس كودك الأصلي)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; AOS.init(); }, 600);
            }, 800);
        });
        
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    </script>

    <script type="module" src="./hhmail.js"></script>

    <script>
    // منع النقر بالزر الأيمن للفارة (Right Click)
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    // منع اختصارات لوحة المفاتيح
    document.onkeydown = function(e) {
        // منع F12
        if (event.keyCode == 123) {
            return false;
        }

        
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
            return false;
        }

        
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
            return false;
        }

        
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
            return false;
        }

        
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
            return false;
        }

        
        if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) {
            return false;
        }
    };
</script>
</body>
</html>
